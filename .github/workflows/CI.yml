name: CI
on:
  pull_request:
  push:
    branches:
      - master
    tags: '*'
  workflow_dispatch:

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            version: '1.10'
            lib_subdir: 'x86_64-mingw32'
            shim_ext: '.dll'
          - os: ubuntu-latest
            version: '1.10'
            lib_subdir: 'x86_64-linux-gnu'
            shim_ext: '.so'
          - os: macos-latest
            version: '1.10'
            lib_subdir: 'aarch64-apple-darwin'
            shim_ext: '.dylib'
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - name: Cache Julia artifacts
        uses: actions/cache@v4
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-julia-${{ matrix.version }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-julia-${{ matrix.version }}-

      - name: Install dependencies and build
        shell: bash
        run: |
          julia --color=yes --project -e '
            import Pkg
            Pkg.Registry.add("General")
            Pkg.instantiate()
            Pkg.build()
          '

      - name: Build ModelicaCallbacks shim (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          gcc -shared -fPIC -o lib/ext/shared/${{ matrix.lib_subdir }}/libModelicaCallbacks.so src/modelica_callbacks.c -ldl

      - name: Build ModelicaCallbacks shim (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p lib/ext/shared/${{ matrix.lib_subdir }}
          cc -dynamiclib -fPIC -o lib/ext/shared/${{ matrix.lib_subdir }}/libModelicaCallbacks.dylib src/modelica_callbacks.c -ldl

      - name: Build ModelicaCallbacks shim (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p lib/ext/shared/${{ matrix.lib_subdir }}
          gcc -shared -o lib/ext/shared/${{ matrix.lib_subdir }}/libModelicaCallbacks.dll src/modelica_callbacks.c

      - name: Upload shim artifact
        uses: actions/upload-artifact@v4
        with:
          name: libModelicaCallbacks-${{ matrix.lib_subdir }}
          path: lib/ext/shared/${{ matrix.lib_subdir }}/libModelicaCallbacks${{ matrix.shim_ext }}

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          export LD_LIBRARY_PATH="$(pwd)/lib/ext/shared/${{ matrix.lib_subdir }}:${LD_LIBRARY_PATH}"
          julia --color=yes --project -e '
            import Pkg
            Pkg.test()
          '

      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          export DYLD_LIBRARY_PATH="$(pwd)/lib/ext/shared/${{ matrix.lib_subdir }}:${DYLD_LIBRARY_PATH}"
          julia --color=yes --project -e '
            import Pkg
            Pkg.test()
          '

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          PATH: ${{ github.workspace }}/lib/ext/shared/${{ matrix.lib_subdir }};${{ env.PATH }}
        run: |
          julia --color=yes --project -e '
            import Pkg
            Pkg.test()
          '

  release:
    name: Release dynamic libraries
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all shim artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: libModelicaCallbacks-*
          path: artifacts

      - name: Package per platform
        shell: bash
        run: |
          for dir in artifacts/*/; do
            platform=$(basename "$dir" | sed 's/^libModelicaCallbacks-//')
            cd "$dir"
            tar -czvf "../../${platform}-callbacks.tar.gz" *
            cd ../..
          done

      - name: Create release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          draft: false
          prerelease: false
          title: "ModelicaCallbacks Shim ${{ github.ref_name }}"
          files: |
            *-callbacks.tar.gz
